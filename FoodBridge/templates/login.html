{% extends "base.html" %}

{% block title %}Login - FoodBridge{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card">
            <div class="card-body">
                <h2 class="card-title text-center mb-4">Welcome Back</h2>
                
                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control" id="username" name="username" required>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">Login</button>
                    </div>
                </form>

                <div class="text-center mt-3">
                    <p>Don't have an account? <a href="{{ url_for('register') }}">Register here</a></p>
                </div>
                
                <div class="mt-4 p-3 bg-light rounded">
                    <h6 class="mb-2">Demo Accounts:</h6>
                    <small class="text-muted">
                        <strong>Admin:</strong> username: admin, password: admin123<br>
                        <em>Create donor and charity accounts to test the full system</em>
                    </small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
